<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planner">
<title>Planner · Voz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:#f5f4f1;font-family:-apple-system,'Inter',sans-serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{background:#fff;border-radius:28px;padding:40px 32px;width:100%;max-width:320px;text-align:center;border:1px solid #e2e0d9;display:flex;flex-direction:column;align-items:center;gap:22px}
.logo{font-size:13px;font-weight:600;color:#aaa89f;letter-spacing:.05em;text-transform:uppercase}
.mic-wrap{position:relative;width:120px;height:120px}
.mic-ring{position:absolute;inset:0;border-radius:50%;border:2px solid #e2e0d9;transition:all .2s}
.mic-ring.active{border-color:#ef4444;animation:ring 1.2s ease-in-out infinite}
.mic-btn{width:120px;height:120px;border-radius:50%;border:none;background:#1c1b18;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:44px;transition:transform .15s,background .2s;position:relative;z-index:1}
.mic-btn:active{transform:scale(.93)}
.mic-btn.active{background:#ef4444}
.mic-btn.success{background:#22c55e}
.status{font-size:15px;font-weight:500;color:#1c1b18;min-height:22px}
.status.muted{color:#aaa89f;font-weight:400}
.status.error{color:#ef4444}
.status.ok{color:#22c55e}
.tbox{background:#f5f4f1;border-radius:14px;padding:14px 16px;width:100%;min-height:64px;display:flex;align-items:center;justify-content:center;border:1px solid #e2e0d9;transition:border-color .2s}
.tbox.active{border-color:#ef4444}
.tbox.success{border-color:#22c55e}
.ttxt{font-size:15px;color:#1c1b18;line-height:1.5;text-align:center;font-style:italic}
.ttxt.empty{color:#aaa89f;font-style:normal;font-size:13px}
.count-wrap{display:flex;align-items:center;gap:8px}
.count-label{font-size:12px;color:#aaa89f}
.count-num{font-size:13px;font-weight:600;color:#1c1b18;background:#f5f4f1;border:1px solid #e2e0d9;padding:2px 10px;border-radius:20px}
.recent{width:100%;display:flex;flex-direction:column;gap:6px}
.rtitle{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#aaa89f;text-align:left}
.ritem{background:#f5f4f1;border-radius:10px;padding:9px 12px;font-size:13px;color:#6b6960;text-align:left;border:1px solid #e2e0d9;display:flex;align-items:center;gap:8px}
.rdot{width:6px;height:6px;border-radius:50%;background:#aaa89f;flex-shrink:0}
.open-btn{width:100%;padding:12px;border-radius:10px;border:1px solid #e2e0d9;background:#fff;color:#6b6960;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.open-btn:active{background:#f5f4f1}
@keyframes ring{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.12);opacity:1}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Planner · Tomas</div>
  <div class="mic-wrap">
    <div class="mic-ring" id="mic-ring"></div>
    <button class="mic-btn" id="mic-btn" onclick="toggle()">🎤</button>
  </div>
  <div class="status muted" id="status">Tocá para dictar</div>
  <div class="tbox" id="tbox">
    <div class="ttxt empty" id="ttxt">Tu tarea aparece acá...</div>
  </div>
  <div class="count-wrap">
    <span class="count-label">Tareas en backlog:</span>
    <span class="count-num" id="count">0</span>
  </div>
  <div class="recent" id="recent" style="display:none">
    <div class="rtitle">Últimas agregadas</div>
    <div id="rlist"></div>
  </div>
  <button class="open-btn" onclick="window.location.href='index.html'">Abrir planner completo →</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzdSZmQJ-dw_Ddee1RVeYS7xgeOYmC0Rk",
  authDomain: "planner-tomas.firebaseapp.com",
  projectId: "planner-tomas",
  storageBucket: "planner-tomas.firebasestorage.app",
  messagingSenderId: "260528369021",
  appId: "1:260528369021:web:1c041a8aafe8dfbb687014"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function saveTask(name) {
  await addDoc(collection(db, "backlog"), {
    name: name,
    aid: null,
    sid: null,
    done: false,
    createdAt: new Date().toISOString()
  });
}

async function updateUI() {
  try {
    // Contar tareas pendientes
    const q = query(collection(db, "backlog"));
    const snap = await getCountFromServer(q);
    document.getElementById('count').textContent = snap.data().count;

    // Últimas 3 tareas
    const recent = query(collection(db, "backlog"), orderBy("createdAt", "desc"), limit(3));
    const rSnap = await getDocs(recent);
    const items = [];
    rSnap.forEach(function(doc) { items.push(doc.data()); });

    if (items.length) {
      document.getElementById('recent').style.display = 'flex';
      document.getElementById('rlist').innerHTML = items.map(function(t) {
        return '<div class="ritem"><div class="rdot"></div>' + esc(t.name) + '</div>';
      }).join('');
    }
  } catch(e) { console.log(e); }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setStatus(txt, cls) { var e=document.getElementById('status'); e.textContent=txt; e.className='status'+(cls?' '+cls:''); }
function setTranscript(txt, cls) {
  var box=document.getElementById('tbox'), el=document.getElementById('ttxt');
  if(txt){el.textContent=txt;el.className='ttxt';}
  else{el.textContent='Tu tarea aparece acá...';el.className='ttxt empty';}
  box.className='tbox'+(cls?' '+cls:'');
}

var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
var rec = null, active = false;

window.toggle = function() {
  if (!SR) { setStatus('Tu browser no soporta dictado', 'error'); return; }
  if (active) { rec.stop(); return; }

  rec = new SR();
  rec.lang = 'es-AR';
  rec.continuous = false;
  rec.interimResults = true;

  rec.onstart = function() {
    active = true;
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('mic-btn').textContent = '⏹';
    document.getElementById('mic-ring').classList.add('active');
    setStatus('Escuchando...', '');
    setTranscript('', 'active');
  };

  rec.onresult = function(e) {
    var txt = '';
    for (var i = e.resultIndex; i < e.results.length; i++) txt += e.results[i][0].transcript;
    setTranscript(txt, 'active');
  };

  rec.onend = async function() {
    active = false;
    document.getElementById('mic-btn').classList.remove('active');
    document.getElementById('mic-ring').classList.remove('active');
    var txt = document.getElementById('ttxt').textContent;
    var isEmpty = document.getElementById('ttxt').classList.contains('empty');

    if (!isEmpty && txt && txt !== 'Tu tarea aparece acá...') {
      try {
        await saveTask(txt);
        document.getElementById('mic-btn').classList.add('success');
        document.getElementById('mic-btn').textContent = '✓';
        setStatus('¡Tarea agregada!', 'ok');
        setTranscript(txt, 'success');
        await updateUI();
        setTimeout(function() {
          document.getElementById('mic-btn').classList.remove('success');
          document.getElementById('mic-btn').textContent = '🎤';
          setStatus('Tocá para dictar', 'muted');
          setTranscript('', '');
        }, 2000);
      } catch(e) {
        setStatus('Error al guardar. Verificá conexión.', 'error');
        document.getElementById('mic-btn').textContent = '🎤';
      }
    } else {
      document.getElementById('mic-btn').textContent = '🎤';
      setStatus('No se escuchó nada. Intentá de nuevo.', 'muted');
    }
  };

  rec.onerror = function(e) {
    active = false;
    document.getElementById('mic-btn').classList.remove('active');
    document.getElementById('mic-btn').textContent = '🎤';
    document.getElementById('mic-ring').classList.remove('active');
    if (e.error === 'not-allowed') setStatus('Permiso denegado — habilitá el micrófono en Ajustes', 'error');
    else if (e.error === 'no-speech') setStatus('No se detectó audio. Intentá de nuevo.', 'muted');
    else setStatus('Error: ' + e.error, 'error');
    setTranscript('', '');
  };

  rec.start();
};

updateUI();
</script>
</body>
</html>
